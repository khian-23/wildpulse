name: wildpulse_prototype_app
description: "WildPulse Wildlife Monitoring Application"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  # Map and GPS
  flutter_map: ^8.1.1
  latlong2: ^0.9.1
  geolocator: ^11.1.0

  # Networking
  http: ^1.2.2
  web_socket_channel: ^2.4.0
  socket_io_client: ^2.0.0-beta.4-nullsafety.0

  # Local storage & notifications
  path_provider: ^2.0.14
  flutter_local_notifications: ^19.2.0
  firebase_core: ^3.4.1
  firebase_messaging: ^15.1.2

  # Charts for analytics dashboard
  fl_chart: ^0.66.0
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/wildpulse.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/wildpulse.png"

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/wild.jpg
    - assets/hog.jpg
    - assets/philippine_hornbill.jpg
    - assets/visayan_warty_pig.jpg
    - assets/wildlogo.jpg
    - assets/visayan_spotted_deer.jpg
    - assets/wildpulse.png
